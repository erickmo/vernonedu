global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'entrepreneurship-api'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'entrepreneurship-api'
          environment: 'development'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
