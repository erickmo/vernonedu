<!DOCTYPE html>
<html lang="id">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="MCB Junior - Alat bantu pembentukan mindset dan habit anak melalui permainan, tugas, dan reward">
  <meta name="keywords" content="anak, habit, kebiasaan, mindset, game, edukasi, reward">

  <!-- PWA meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MCB Junior">
  <meta name="theme-color" content="#4361EE">

  <!-- Open Graph -->
  <meta property="og:title" content="MCB Junior">
  <meta property="og:description" content="Tumbuh Bersama Kebiasaan Baik!">
  <meta property="og:type" content="website">

  <!-- Icons -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <title>MCB Junior — Tumbuh Bersama Kebiasaan Baik!</title>

  <style>
    /* Loading screen */
    body {
      margin: 0;
      background-color: #F0F4FF;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #loading {
      text-align: center;
      animation: fadeIn 0.5s ease;
    }

    #loading .emoji {
      font-size: 64px;
      animation: bounce 1s infinite;
    }

    #loading p {
      color: #4361EE;
      font-size: 16px;
      font-weight: 600;
      margin-top: 16px;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="emoji">🦸</div>
    <p>MCB Junior sedang memuat...</p>
  </div>

  <script>
    // Sembunyikan loading screen saat Flutter siap
    window.addEventListener('flutter-first-frame', function() {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.style.transition = 'opacity 0.3s ease';
        loading.style.opacity = '0';
        setTimeout(() => loading.remove(), 300);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
