name: vernonedu_entrepreneurship_app
description: "VernonEdu Entrepreneurship - Guide siswa belajar dan praktek bisnis"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^14.0.0

  # Network
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Local Storage
  shared_preferences: ^2.3.0

  # Dependency Injection
  get_it: ^8.0.0

  # Functional Programming (Either)
  dartz: ^0.10.1

  # Code Generation
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # UI
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10
  google_fonts: ^6.2.0

  # Utils
  intl: ^0.19.0
  logger: ^2.5.0
  uuid: ^4.5.1
  connectivity_plus: ^6.1.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

  # Code Generation
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  fonts: []
