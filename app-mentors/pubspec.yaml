name: vernonedu_mentors
description: "VernonEdu Mentors — Aplikasi untuk Course Owner, Mentor, dan Fasilitator"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^14.0.0

  # Network
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Local Storage
  shared_preferences: ^2.3.0

  # Dependency Injection
  get_it: ^8.0.0

  # Functional Programming
  dartz: ^0.10.1

  # UI
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  google_fonts: ^6.2.0
  intl: ^0.19.0

  # Utils
  logger: ^2.5.0
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
